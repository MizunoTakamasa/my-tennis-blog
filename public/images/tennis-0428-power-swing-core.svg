<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="psArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="psArrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <rect x="20" y="13" width="135" height="22" fill="#2c3e50" rx="4"/>
  <text x="87" y="29" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">両手打ちバックハンド</text>
  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">体に力を入れて振る｜小さなバックスイング × 右踵を踏む</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">大きく振り回さない。体幹で支えて、右踵で地面を踏んで振る</text>

  <line x1="277" y1="68" x2="277" y2="478" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="547" y1="68" x2="547" y2="478" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ============= Panel 1: Small backswing (HIP level, NOT mirrored) ============= -->
  <rect x="20" y="78" width="245" height="30" fill="#3498db" rx="4"/>
  <text x="142" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①小さなバックスイング</text>

  <line x1="35" y1="345" x2="260" y2="345" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Hip-level reference dashed line -->
  <line x1="115" y1="252" x2="245" y2="252" stroke="#1e8449" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Player body -->
  <circle cx="142" cy="155" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
  <path d="M 132 170 Q 128 220 136 270 L 152 270 Q 160 220 154 170 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>

  <!-- Both arms reaching down to hands at hip level -->
  <line x1="132" y1="190" x2="188" y2="248" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="132" y1="190" x2="188" y2="248" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="152" y1="190" x2="190" y2="248" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="152" y1="190" x2="190" y2="248" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Hands at hip level -->
  <circle cx="190" cy="250" r="6" fill="#f5cba7" stroke="#555" stroke-width="1.2"/>

  <!-- Racket at HIP level, extending back-right (slight up) -->
  <line x1="190" y1="250" x2="222" y2="242" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="232" cy="240" rx="11" ry="13" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <line x1="222" y1="237" x2="240" y2="234" stroke="#c0392b" stroke-width="0.8"/>
  <line x1="222" y1="241" x2="240" y2="240" stroke="#c0392b" stroke-width="0.8"/>
  <line x1="222" y1="245" x2="240" y2="246" stroke="#c0392b" stroke-width="0.8"/>

  <!-- Legs -->
  <rect x="135" y="270" width="10" height="73" fill="#aaa" stroke="#888" rx="2"/>
  <rect x="148" y="270" width="10" height="73" fill="#aaa" stroke="#888" rx="2"/>
  <ellipse cx="140" cy="345" rx="13" ry="4" fill="#bbb" stroke="#888"/>
  <ellipse cx="153" cy="345" rx="13" ry="4" fill="#bbb" stroke="#888"/>

  <!-- "腰の高さ" label -->
  <text x="225" y="246" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">腰の高さ</text>

  <!-- Note box -->
  <rect x="30" y="365" width="225" height="100" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
  <text x="142" y="385" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">大きく振りかぶらない</text>
  <text x="142" y="405" text-anchor="middle" font-size="10" fill="#0e6251">ラケットは腰の高さくらい</text>
  <text x="142" y="425" text-anchor="middle" font-size="10" fill="#0e6251">体の力で「押す」イメージ</text>
  <text x="142" y="445" text-anchor="middle" font-size="10" fill="#0e6251">→ 振り遅れない・ブレない</text>

  <!-- ============= Panel 2: Left heel down (NOT mirrored) ============= -->
  <rect x="290" y="78" width="245" height="30" fill="#c0392b" rx="4"/>
  <text x="412" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②右踵を踏んで振る</text>

  <line x1="305" y1="345" x2="530" y2="345" stroke="#7f8c8d" stroke-width="2"/>

  <circle cx="395" cy="155" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
  <path d="M 385 170 Q 381 220 391 270 L 411 270 Q 419 220 413 170 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
  <line x1="408" y1="190" x2="465" y2="200" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="408" y1="190" x2="465" y2="200" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="392" y1="190" x2="455" y2="200" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="392" y1="190" x2="455" y2="200" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="463" cy="200" r="6" fill="#f5cba7" stroke="#555" stroke-width="1.2"/>
  <line x1="463" y1="200" x2="510" y2="180" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="517" cy="178" rx="11" ry="13" fill="#fff" stroke="#c0392b" stroke-width="2"/>

  <!-- Front foot (left foot) - heel emphasized -->
  <line x1="395" y1="270" x2="385" y2="338" stroke="#c0392b" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="383" cy="343" rx="18" ry="6" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
  <ellipse cx="372" cy="343" rx="7" ry="5" fill="#922b21" stroke="#641e16" stroke-width="2"/>
  <line x1="372" y1="320" x2="372" y2="338" stroke="#c0392b" stroke-width="3" marker-end="url(#psArrow)"/>

  <!-- Back foot - lifted slightly -->
  <line x1="411" y1="270" x2="430" y2="335" stroke="#888" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="437" cy="340" rx="15" ry="5" fill="#bbb" stroke="#888"/>

  <!-- Ground reaction force arrow (UP) -->
  <line x1="372" y1="395" x2="372" y2="372" stroke="#3498db" stroke-width="2" marker-end="url(#psArrowB)"/>

  <!-- Panel 2 text labels -->
  <text x="372" y="346" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">踵</text>
  <text x="347" y="325" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">踏む</text>
  <text x="372" y="362" text-anchor="middle" font-size="9" fill="#3498db" font-weight="bold">↑反力</text>
  <text x="437" y="358" text-anchor="middle" font-size="9" fill="#777">後ろ足は軽い</text>

  <!-- Note box -->
  <rect x="300" y="365" width="225" height="100" fill="#fef5f4" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="412" y="385" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">右踵で地面を踏み込む</text>
  <text x="412" y="405" text-anchor="middle" font-size="10" fill="#a93226">体重を右足にしっかり載せる</text>
  <text x="412" y="425" text-anchor="middle" font-size="10" fill="#a93226">地面からの「反力」を使う</text>
  <text x="412" y="445" text-anchor="middle" font-size="10" fill="#a93226">→ パワーが上に伝わる</text>

  <!-- ============= Panel 3: Core engagement (NOT mirrored) ============= -->
  <rect x="560" y="78" width="245" height="30" fill="#d68910" rx="4"/>
  <text x="682" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">③体幹に効く</text>

  <line x1="575" y1="345" x2="800" y2="345" stroke="#7f8c8d" stroke-width="2"/>

  <circle cx="682" cy="155" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
  <path d="M 668 170 Q 663 215 670 260 L 694 260 Q 701 215 696 170 Z" fill="#fdf5e7" stroke="#d68910" stroke-width="2"/>
  <!-- Core abs lines -->
  <line x1="676" y1="190" x2="688" y2="190" stroke="#d68910" stroke-width="1.5"/>
  <line x1="676" y1="205" x2="688" y2="205" stroke="#d68910" stroke-width="1.5"/>
  <line x1="676" y1="220" x2="688" y2="220" stroke="#d68910" stroke-width="1.5"/>
  <line x1="676" y1="235" x2="688" y2="235" stroke="#d68910" stroke-width="1.5"/>
  <line x1="682" y1="180" x2="682" y2="245" stroke="#d68910" stroke-width="1.5"/>

  <!-- Arms in mid-swing -->
  <line x1="694" y1="190" x2="730" y2="195" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="694" y1="190" x2="730" y2="195" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="670" y1="190" x2="725" y2="200" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="670" y1="190" x2="725" y2="200" stroke="#f5cba7" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="730" cy="200" r="6" fill="#f5cba7" stroke="#555" stroke-width="1.2"/>
  <line x1="730" y1="200" x2="770" y2="170" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="775" cy="166" rx="11" ry="13" fill="#fff" stroke="#c0392b" stroke-width="2"/>

  <!-- Rotation arrows -->
  <path d="M 660 220 Q 645 230 660 245" stroke="#d68910" stroke-width="2.5" fill="none" marker-end="url(#psArrow)"/>
  <path d="M 705 220 Q 720 230 705 245" stroke="#d68910" stroke-width="2.5" fill="none"/>

  <!-- Core label arrow -->
  <line x1="730" y1="220" x2="704" y2="215" stroke="#d68910" stroke-width="1.5" marker-end="url(#psArrow)"/>

  <!-- Legs -->
  <rect x="673" y="260" width="10" height="83" fill="#aaa" stroke="#888" rx="2"/>
  <rect x="685" y="260" width="10" height="83" fill="#aaa" stroke="#888" rx="2"/>
  <ellipse cx="678" cy="345" rx="13" ry="4" fill="#bbb" stroke="#888"/>
  <ellipse cx="690" cy="345" rx="13" ry="4" fill="#bbb" stroke="#888"/>

  <!-- Panel 3 text labels -->
  <text x="635" y="225" text-anchor="end" font-size="10" fill="#d68910" font-weight="bold">回旋</text>
  <text x="745" y="225" text-anchor="start" font-size="10" fill="#d68910" font-weight="bold">支え</text>
  <text x="775" y="247" text-anchor="start" font-size="11" fill="#d68910" font-weight="bold">体幹</text>

  <!-- Note box -->
  <rect x="570" y="365" width="225" height="100" fill="#fdf5e7" stroke="#d68910" stroke-width="1.5" rx="4"/>
  <text x="682" y="385" text-anchor="middle" font-size="11" fill="#d68910" font-weight="bold">小さな振り＋踵で踏む</text>
  <text x="682" y="405" text-anchor="middle" font-size="10" fill="#9c640c">体幹で支えないと振れない</text>
  <text x="682" y="425" text-anchor="middle" font-size="10" fill="#9c640c">逆に言うと…</text>
  <text x="682" y="445" text-anchor="middle" font-size="10" fill="#9c640c">→ 続ければ体幹が鍛えられる</text>

  <text x="410" y="492" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">→ 大きく振らずに「体の力」で打つ。最初はキツいけど、体幹が育つほど安定して飛ぶようになる</text>
</svg>
