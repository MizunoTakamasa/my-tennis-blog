<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="テニスの体で振る感覚が定着するまでの3段階｜知識・意識・自動化のプロセスを示した図">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 17px; font-weight: 700; fill: #fff; }
      .day { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; font-weight: 700; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <marker id="arr-pink" markerWidth="14" markerHeight="14" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#e91e63"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#f6f9fc"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">「体で振る」が定着するまでの3段階</text>
  <text x="400" y="62" class="cap" text-anchor="middle">＊昨日（4/29）に意識し、今日（4/30）に体に入った実感</text>

  <!-- Stage 1: 知識 -->
  <rect x="60" y="110" width="200" height="40" rx="6" fill="#9b59b6"/>
  <text x="160" y="137" class="stl" text-anchor="middle">① 知識として知る</text>
  <rect x="60" y="155" width="200" height="22" rx="0" fill="#9b59b6" opacity="0.7"/>
  <text x="160" y="172" class="day" text-anchor="middle">入門〜本やコーチから</text>

  <rect x="60" y="195" width="200" height="180" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
  <text x="160" y="220" class="lbl" text-anchor="middle" font-weight="700">頭で理解する段階</text>
  <text x="75" y="248" class="note">・「腕じゃなくて体で振る」</text>
  <text x="75" y="266" class="note">・「運動連鎖」</text>
  <text x="75" y="284" class="note">・「踏み込み足から」</text>
  <text x="75" y="312" class="note" fill="#7d3c98" font-weight="700">→ でも体は動かない</text>
  <text x="75" y="330" class="note">　言葉と動作が一致せず</text>
  <text x="75" y="348" class="note">　「で、どうやるの？」状態</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="285" x2="295" y2="285" stroke="#e91e63" stroke-width="3" marker-end="url(#arr-pink)"/>

  <!-- Stage 2: 意識 -->
  <rect x="305" y="110" width="200" height="40" rx="6" fill="#3498db"/>
  <text x="405" y="137" class="stl" text-anchor="middle">② 意識すれば出来る</text>
  <rect x="305" y="155" width="200" height="22" rx="0" fill="#3498db" opacity="0.7"/>
  <text x="405" y="172" class="day" text-anchor="middle">昨日（4/29）の自分</text>

  <rect x="305" y="195" width="200" height="180" rx="8" fill="#fff" stroke="#3498db" stroke-width="2"/>
  <text x="405" y="220" class="lbl" text-anchor="middle" font-weight="700">意識を向ければ動く段階</text>
  <text x="320" y="248" class="note">・思い出すと体で振れる</text>
  <text x="320" y="266" class="note">・忘れるとまた腕で打つ</text>
  <text x="320" y="284" class="note">・1球ずつ確認が必要</text>
  <text x="320" y="312" class="note" fill="#2980b9" font-weight="700">△ ボールが速いと崩れる</text>
  <text x="320" y="330" class="note">　予測外の球で腕に戻る</text>
  <text x="320" y="348" class="note">　まだ「練習中の感覚」</text>

  <!-- Arrow 2 -->
  <line x1="515" y1="285" x2="540" y2="285" stroke="#e91e63" stroke-width="3" marker-end="url(#arr-pink)"/>

  <!-- Stage 3: 自動化 -->
  <rect x="550" y="110" width="200" height="40" rx="6" fill="#27ae60"/>
  <text x="650" y="137" class="stl" text-anchor="middle">③ 自動的に出来る</text>
  <rect x="550" y="155" width="200" height="22" rx="0" fill="#27ae60" opacity="0.7"/>
  <text x="650" y="172" class="day" text-anchor="middle">今日（4/30）の感覚</text>

  <rect x="550" y="195" width="200" height="180" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="650" y="220" class="lbl" text-anchor="middle" font-weight="700">考えなくても出る段階</text>
  <text x="565" y="248" class="note">・体が勝手に動く</text>
  <text x="565" y="266" class="note">・腕は遅れて出てくる</text>
  <text x="565" y="284" class="note">・テンポが速くてもOK</text>
  <text x="565" y="312" class="note" fill="#1e8449" font-weight="700">◎ 「人で試したい」と思える</text>
  <text x="565" y="330" class="note">　＝対人練習に進むサイン</text>
  <text x="565" y="348" class="note">　次の段階へ</text>

  <!-- bottom takeaway -->
  <rect x="80" y="400" width="640" height="40" rx="6" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="425" class="lbl" text-anchor="middle" fill="#1e8449" font-weight="700">★「1日目に意識→2日目に体に入る」のリズムを自分で観察できると、上達が見える</text>
</svg>
