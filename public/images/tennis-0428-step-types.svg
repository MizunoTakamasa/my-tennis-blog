<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="stArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">テニスのステップ5種類｜場面別の使い分け</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">スプリット・サイド・クロス・ドロップ・リカバリー</text>

  <!-- ============ Panel 1: スプリットステップ ============ -->
  <rect x="20" y="78" width="255" height="30" fill="#1e8449" rx="4"/>
  <text x="147" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①スプリットステップ</text>
  <rect x="20" y="115" width="255" height="150" fill="#eafaf1"/>

  <ellipse cx="125" cy="175" rx="11" ry="16" fill="#1e8449" stroke="#0e6251" stroke-width="1.5"/>
  <text x="125" y="179" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">L</text>
  <ellipse cx="170" cy="175" rx="11" ry="16" fill="#1e8449" stroke="#0e6251" stroke-width="1.5"/>
  <text x="170" y="179" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">R</text>

  <line x1="125" y1="138" x2="125" y2="158" stroke="#c0392b" stroke-width="2.5" marker-end="url(#stArr)"/>
  <line x1="170" y1="138" x2="170" y2="158" stroke="#c0392b" stroke-width="2.5" marker-end="url(#stArr)"/>

  <path d="M 100 200 Q 147 215 195 200" stroke="#1e8449" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>

  <text x="147" y="232" text-anchor="middle" font-size="10" fill="#0e6251" font-weight="bold">相手が打つ瞬間に小さく着地</text>
  <text x="147" y="252" text-anchor="middle" font-size="9" fill="#0e6251">→ 全方向に動ける構えに戻る</text>

  <!-- ============ Panel 2: サイドステップ ============ -->
  <rect x="280" y="78" width="255" height="30" fill="#3498db" rx="4"/>
  <text x="407" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②サイドステップ</text>
  <rect x="280" y="115" width="255" height="150" fill="#ebf5fb"/>

  <ellipse cx="320" cy="175" rx="9" ry="13" fill="#3498db" stroke="#2874a6" stroke-width="1.5"/>
  <ellipse cx="343" cy="175" rx="9" ry="13" fill="#3498db" stroke="#2874a6" stroke-width="1.5"/>

  <ellipse cx="473" cy="175" rx="9" ry="13" fill="#3498db" stroke="#2874a6" stroke-width="1.5"/>
  <ellipse cx="496" cy="175" rx="9" ry="13" fill="#3498db" stroke="#2874a6" stroke-width="1.5"/>

  <line x1="365" y1="175" x2="450" y2="175" stroke="#c0392b" stroke-width="2.5" marker-end="url(#stArr)"/>
  <text x="407" y="167" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">スライド</text>

  <text x="407" y="220" text-anchor="middle" font-size="10" fill="#2874a6" font-weight="bold">体を正面に・足は交差しない</text>
  <text x="407" y="240" text-anchor="middle" font-size="10" fill="#2874a6">近距離（〜2歩分）の横移動</text>
  <text x="407" y="256" text-anchor="middle" font-size="9" fill="#2874a6">→ 安定。視野が切れない</text>

  <!-- ============ Panel 3: クロスステップ ============ -->
  <rect x="540" y="78" width="260" height="30" fill="#d68910" rx="4"/>
  <text x="670" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">③クロスステップ</text>
  <rect x="540" y="115" width="260" height="150" fill="#fdf6ec"/>

  <ellipse cx="568" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5"/>
  <ellipse cx="588" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5"/>
  <text x="578" y="200" text-anchor="middle" font-size="8" fill="#9c640c">スタート</text>

  <ellipse cx="660" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5" transform="rotate(20 660 175)"/>
  <ellipse cx="680" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5"/>
  <text x="670" y="200" text-anchor="middle" font-size="8" fill="#9c640c">クロス</text>

  <ellipse cx="752" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5"/>
  <ellipse cx="772" cy="175" rx="9" ry="13" fill="#d68910" stroke="#9c640c" stroke-width="1.5"/>
  <text x="762" y="200" text-anchor="middle" font-size="8" fill="#9c640c">ゴール</text>

  <line x1="606" y1="160" x2="640" y2="160" stroke="#c0392b" stroke-width="2" marker-end="url(#stArr)"/>
  <line x1="700" y1="160" x2="734" y2="160" stroke="#c0392b" stroke-width="2" marker-end="url(#stArr)"/>

  <text x="670" y="225" text-anchor="middle" font-size="10" fill="#9c640c" font-weight="bold">片足が反対側へクロス</text>
  <text x="670" y="244" text-anchor="middle" font-size="10" fill="#9c640c">遠距離（3歩以上）・速い</text>
  <text x="670" y="260" text-anchor="middle" font-size="9" fill="#9c640c">→ 視野が切れる、最後はサイドで微調整</text>

  <!-- ============ Panel 4: ドロップステップ ============ -->
  <rect x="20" y="285" width="255" height="30" fill="#8e44ad" rx="4"/>
  <text x="147" y="305" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">④ドロップステップ</text>
  <rect x="20" y="322" width="255" height="155" fill="#f5eef8"/>

  <ellipse cx="80" cy="395" rx="10" ry="14" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <ellipse cx="103" cy="395" rx="10" ry="14" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <text x="92" y="423" text-anchor="middle" font-size="8" fill="#6c3483">前向き</text>

  <ellipse cx="190" cy="385" rx="10" ry="14" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5" transform="rotate(135 190 385)"/>
  <ellipse cx="215" cy="395" rx="10" ry="14" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <text x="203" y="423" text-anchor="middle" font-size="8" fill="#6c3483">後ろ向き</text>

  <path d="M 125 380 Q 155 360 175 380" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#stArr)"/>
  <text x="150" y="358" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">回転</text>

  <text x="147" y="445" text-anchor="middle" font-size="10" fill="#6c3483" font-weight="bold">片足を後ろへ引いて体を開く</text>
  <text x="147" y="461" text-anchor="middle" font-size="9" fill="#6c3483">→ ロブ・深い球で後退の1歩目</text>

  <!-- ============ Panel 5: リカバリーステップ ============ -->
  <rect x="280" y="285" width="255" height="30" fill="#229954" rx="4"/>
  <text x="407" y="305" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">⑤リカバリーステップ</text>
  <rect x="280" y="322" width="255" height="155" fill="#e8f6ef"/>

  <ellipse cx="500" cy="395" rx="10" ry="14" fill="#229954" stroke="#1d6f48" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="523" cy="395" rx="10" ry="14" fill="#229954" stroke="#1d6f48" stroke-width="1.5" opacity="0.45"/>
  <text x="511" y="423" text-anchor="middle" font-size="8" fill="#1d6f48">打った場所</text>

  <ellipse cx="380" cy="395" rx="10" ry="14" fill="#229954" stroke="#1d6f48" stroke-width="1.5"/>
  <ellipse cx="403" cy="395" rx="10" ry="14" fill="#229954" stroke="#1d6f48" stroke-width="1.5"/>
  <text x="391" y="423" text-anchor="middle" font-size="8" fill="#1d6f48">中央復帰</text>

  <line x1="490" y1="380" x2="430" y2="380" stroke="#c0392b" stroke-width="2.5" marker-end="url(#stArr)"/>
  <text x="460" y="370" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">サイド／クロスで戻る</text>

  <text x="407" y="445" text-anchor="middle" font-size="10" fill="#1d6f48" font-weight="bold">打球後すぐ中央へ戻る</text>
  <text x="407" y="461" text-anchor="middle" font-size="9" fill="#1d6f48">→ 「打って終わり」をなくす</text>

  <!-- ============ Panel 6: 1ポイントの流れ ============ -->
  <rect x="540" y="285" width="260" height="30" fill="#566573" rx="4"/>
  <text x="670" y="305" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">⑥1ポイントでの順序</text>
  <rect x="540" y="322" width="260" height="155" fill="#ebeef0"/>

  <text x="670" y="345" text-anchor="middle" font-size="11" fill="#566573" font-weight="bold">5つは順番に使う</text>

  <circle cx="565" cy="370" r="9" fill="#1e8449"/>
  <text x="565" y="374" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>
  <text x="582" y="374" font-size="10" fill="#1e8449" font-weight="bold">スプリット</text>
  <text x="775" y="374" text-anchor="end" font-size="9" fill="#566573">構え直す</text>

  <circle cx="565" cy="392" r="9" fill="#3498db"/>
  <text x="565" y="396" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>
  <text x="582" y="396" font-size="10" fill="#3498db" font-weight="bold">サイド／クロス</text>
  <text x="775" y="396" text-anchor="end" font-size="9" fill="#566573">球の場所へ</text>

  <circle cx="565" cy="414" r="9" fill="#8e44ad"/>
  <text x="565" y="418" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>
  <text x="582" y="418" font-size="10" fill="#8e44ad" font-weight="bold">ドロップ</text>
  <text x="775" y="418" text-anchor="end" font-size="9" fill="#566573">後退時のみ</text>

  <circle cx="565" cy="436" r="9" fill="#229954"/>
  <text x="565" y="440" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>
  <text x="582" y="440" font-size="10" fill="#229954" font-weight="bold">リカバリー</text>
  <text x="775" y="440" text-anchor="end" font-size="9" fill="#566573">中央へ戻る</text>

  <circle cx="565" cy="458" r="9" fill="#1e8449"/>
  <text x="565" y="462" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>
  <text x="582" y="462" font-size="10" fill="#1e8449" font-weight="bold">スプリット</text>
  <text x="775" y="462" text-anchor="end" font-size="9" fill="#566573">→ 1)に戻る</text>
</svg>
