<svg viewBox="0 0 540 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="t1Down" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/>
    </marker>
    <marker id="t1Chain" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f39c12"/>
    </marker>
    <marker id="t1Speed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <text x="270" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">左踵の踏み込み → ヘッドが走る（腕は脱力）</text>

  <!-- Court ground -->
  <line x1="40" y1="395" x2="500" y2="395" stroke="#5dade2" stroke-width="3"/>
  <line x1="40" y1="400" x2="500" y2="400" stroke="#aed6f1" stroke-width="2"/>

  <!-- Tennis player (side view, hitting forehand) -->
  <!-- Head -->
  <circle cx="200" cy="120" r="20" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Torso -->
  <path d="M 180 142 Q 170 220 175 290 Q 200 295 225 290 Q 230 220 220 142 Z" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <!-- Right leg (back) -->
  <rect x="210" y="290" width="18" height="100" fill="#666" rx="3"/>
  <ellipse cx="225" cy="392" rx="22" ry="6" fill="#aaa" stroke="#888" stroke-width="1"/>
  <!-- Left leg (front, weighted) -->
  <rect x="170" y="290" width="18" height="100" fill="#f9d7d3" stroke="#c0392b" stroke-width="1.5" rx="3"/>
  <!-- Left foot with heel emphasis -->
  <ellipse cx="170" cy="392" rx="30" ry="8" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
  <circle cx="185" cy="392" r="9" fill="#fff" stroke="#a93226" stroke-width="2"/>
  <text x="188" y="396" font-size="10" fill="#a93226" font-weight="bold">踵</text>

  <!-- Pressure arrow at left heel (downward) -->
  <line x1="185" y1="350" x2="185" y2="383" stroke="#e74c3c" stroke-width="4" marker-end="url(#t1Down)"/>
  <text x="80" y="375" font-size="13" fill="#c0392b" font-weight="bold">①踵を踏む</text>

  <!-- Arm extended toward ball (relaxed) -->
  <path d="M 220 175 Q 280 180 340 200" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="345" cy="202" r="6" fill="#333"/>
  <!-- Racket grip and head -->
  <line x1="345" y1="202" x2="420" y2="170" stroke="#777" stroke-width="3"/>
  <ellipse cx="430" cy="167" rx="22" ry="14" fill="none" stroke="#444" stroke-width="2.5"/>
  <line x1="411" y1="160" x2="449" y2="174" stroke="#888" stroke-width="0.5"/>
  <line x1="411" y1="170" x2="449" y2="170" stroke="#888" stroke-width="0.5"/>

  <!-- "脱力" label on arm -->
  <rect x="245" y="145" width="60" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="275" y="161" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">腕は脱力</text>

  <!-- Force chain arrow up from heel through body to racket -->
  <path d="M 185 380 Q 175 320 180 250 Q 200 200 240 180 Q 320 175 400 168" stroke="#f39c12" stroke-width="3.5" fill="none" stroke-dasharray="6,3" marker-end="url(#t1Chain)"/>
  <text x="60" y="295" font-size="13" fill="#d68910" font-weight="bold">②力が下から</text>
  <text x="60" y="313" font-size="13" fill="#d68910" font-weight="bold">　上へ流れる</text>

  <!-- Ball -->
  <circle cx="480" cy="170" r="8" fill="#d4ff00" stroke="#7d9a02" stroke-width="1.5"/>
  <!-- Speed/motion lines on racket -->
  <line x1="395" y1="155" x2="375" y2="148" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="395" y1="167" x2="370" y2="167" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="395" y1="180" x2="378" y2="188" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>

  <!-- Step 3 label -->
  <text x="350" y="125" font-size="13" fill="#2874a6" font-weight="bold">③ラケットヘッドが走る</text>

  <!-- Bottom takeaway -->
  <text x="270" y="425" text-anchor="middle" font-size="12" fill="#555">下からの力がヘッドに伝わるから、腕で振らなくていい</text>
</svg>
