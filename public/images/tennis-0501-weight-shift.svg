<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" width="1100" height="360" font-family="'Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
  <rect width="1100" height="360" fill="#ffffff"/>
  <text x="40" y="44" fill="#0f172a" font-size="22" font-weight="800">体重移動のイメージ：左に流すのではなく、右足の上で回る</text>
  <text x="40" y="72" fill="#64748b" font-size="14">右利きフォアハンド／オープンスタンス</text>
  <line x1="60" y1="290" x2="1040" y2="290" stroke="#94a3b8" stroke-width="2"/>

  <g transform="translate(160,170)">
    <text x="0" y="-90" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">① 構え</text>
    <circle cx="0" cy="-50" r="16" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-34" x2="0" y2="40" stroke="#0f172a" stroke-width="5"/>
    <line x1="-20" y1="40" x2="20" y2="40" stroke="#0f172a" stroke-width="4"/>
    <line x1="-20" y1="40" x2="-50" y2="120" stroke="#0f172a" stroke-width="5"/>
    <line x1="20" y1="40" x2="50" y2="120" stroke="#0f172a" stroke-width="5"/>
    <ellipse cx="-50" cy="120" rx="22" ry="6" fill="#475569" opacity="0.6"/>
    <ellipse cx="50" cy="120" rx="22" ry="6" fill="#475569" opacity="0.6"/>
    <text x="0" y="155" text-anchor="middle" fill="#475569" font-size="12">体重 50:50</text>
  </g>

  <g transform="translate(460,170)">
    <text x="0" y="-90" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">② テイクバック</text>
    <circle cx="0" cy="-50" r="16" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-34" x2="5" y2="40" stroke="#0f172a" stroke-width="5"/>
    <line x1="-15" y1="40" x2="25" y2="40" stroke="#0f172a" stroke-width="4"/>
    <line x1="25" y1="40" x2="55" y2="120" stroke="#0f172a" stroke-width="7"/>
    <ellipse cx="55" cy="120" rx="26" ry="8" fill="#16a34a" opacity="0.55"/>
    <line x1="-15" y1="40" x2="-50" y2="120" stroke="#0f172a" stroke-width="4" stroke-dasharray="5,3"/>
    <ellipse cx="-50" cy="120" rx="20" ry="5" fill="#cbd5e1" opacity="0.6"/>
    <text x="0" y="155" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">右足に体重を乗せる</text>
  </g>

  <g transform="translate(760,170)">
    <text x="0" y="-90" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">③ インパクト</text>
    <circle cx="0" cy="-50" r="16" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-34" x2="0" y2="40" stroke="#0f172a" stroke-width="5"/>
    <line x1="-20" y1="40" x2="20" y2="40" stroke="#0f172a" stroke-width="4"/>
    <line x1="20" y1="40" x2="50" y2="120" stroke="#0f172a" stroke-width="7"/>
    <ellipse cx="50" cy="120" rx="26" ry="8" fill="#16a34a" opacity="0.55"/>
    <line x1="-20" y1="40" x2="-50" y2="120" stroke="#0f172a" stroke-width="4" stroke-dasharray="5,3"/>
    <ellipse cx="-50" cy="120" rx="20" ry="5" fill="#cbd5e1" opacity="0.6"/>
    <line x1="-65" y1="-70" x2="-65" y2="120" stroke="#16a34a" stroke-width="4"/>
    <text x="-110" y="-30" fill="#15803d" font-size="12" font-weight="700">左の壁</text>
    <text x="0" y="155" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">右足の上で回る</text>
  </g>

  <g transform="translate(1000,170)">
    <text x="0" y="-90" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">④ フォロー</text>
    <circle cx="0" cy="-50" r="16" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-34" x2="-5" y2="40" stroke="#0f172a" stroke-width="5"/>
    <line x1="-25" y1="40" x2="15" y2="40" stroke="#0f172a" stroke-width="4"/>
    <line x1="15" y1="40" x2="35" y2="120" stroke="#0f172a" stroke-width="6"/>
    <ellipse cx="35" cy="120" rx="22" ry="6" fill="#475569" opacity="0.6"/>
    <line x1="-25" y1="40" x2="-55" y2="100" stroke="#0f172a" stroke-width="4"/>
    <text x="0" y="155" text-anchor="middle" fill="#475569" font-size="12">左足は流さず</text>
  </g>

  <path d="M260,200 L370,200" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M560,200 L670,200" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M860,200 L920,200" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
</svg>
