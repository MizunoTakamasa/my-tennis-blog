<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="テニスの対人練習でチェックする3つのポイントを示した図｜体・球速・サーブ">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 16px; font-weight: 700; fill: #fff; }
      .num { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 800; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; font-weight: 600; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect width="800" height="460" fill="#f6f9fc"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">対人練習でチェックする3つのポイント</text>
  <text x="400" y="62" class="cap" text-anchor="middle">＊欲張らず、3点に絞ると収穫が大きい</text>

  <!-- Card 1 -->
  <rect x="40" y="100" width="240" height="300" rx="10" fill="#fff" stroke="#27ae60" stroke-width="2.5"/>
  <circle cx="80" cy="140" r="22" fill="#27ae60"/>
  <text x="80" y="148" class="num" text-anchor="middle">1</text>
  <text x="115" y="148" class="lbl" font-size="16" fill="#27ae60" font-weight="700">体で振れているか</text>

  <line x1="60" y1="175" x2="260" y2="175" stroke="#27ae60" stroke-width="1" opacity="0.4"/>

  <text x="60" y="205" class="lbl">▶ 確認ポイント</text>
  <text x="60" y="228" class="note">・球が乱れた瞬間に</text>
  <text x="60" y="246" class="note">　腕で当てに行っていないか</text>
  <text x="60" y="270" class="note">・テイクバックで体幹が</text>
  <text x="60" y="288" class="note">　ねじれているか</text>
  <text x="60" y="312" class="note">・打った後に体が</text>
  <text x="60" y="330" class="note">　ターゲット方向を向くか</text>

  <rect x="50" y="350" width="220" height="40" rx="6" fill="#27ae60" opacity="0.1"/>
  <text x="160" y="368" class="lbl" text-anchor="middle" fill="#1e8449" font-weight="700">乱れた球で本物が出る</text>
  <text x="160" y="385" class="note" text-anchor="middle" fill="#1e8449">→ そこを観察する</text>

  <!-- Card 2 -->
  <rect x="290" y="100" width="240" height="300" rx="10" fill="#fff" stroke="#3498db" stroke-width="2.5"/>
  <circle cx="330" cy="140" r="22" fill="#3498db"/>
  <text x="330" y="148" class="num" text-anchor="middle">2</text>
  <text x="365" y="148" class="lbl" font-size="16" fill="#3498db" font-weight="700">球速の中でフォーム</text>

  <line x1="310" y1="175" x2="510" y2="175" stroke="#3498db" stroke-width="1" opacity="0.4"/>

  <text x="310" y="205" class="lbl">▶ 確認ポイント</text>
  <text x="310" y="228" class="note">・スピードが上がっても</text>
  <text x="310" y="246" class="note">　準備が間に合うか</text>
  <text x="310" y="270" class="note">・テイクバックを</text>
  <text x="310" y="288" class="note">　省略していないか</text>
  <text x="310" y="312" class="note">・足が止まらず動けるか</text>

  <rect x="300" y="350" width="220" height="40" rx="6" fill="#3498db" opacity="0.1"/>
  <text x="410" y="368" class="lbl" text-anchor="middle" fill="#2980b9" font-weight="700">壁打ちは自分のリズム</text>
  <text x="410" y="385" class="note" text-anchor="middle" fill="#2980b9">→ 対人は相手のリズム</text>

  <!-- Card 3 -->
  <rect x="540" y="100" width="240" height="300" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2.5"/>
  <circle cx="580" cy="140" r="22" fill="#e67e22"/>
  <text x="580" y="148" class="num" text-anchor="middle">3</text>
  <text x="615" y="148" class="lbl" font-size="16" fill="#e67e22" font-weight="700">サーブも体で打つ</text>

  <line x1="560" y1="175" x2="760" y2="175" stroke="#e67e22" stroke-width="1" opacity="0.4"/>

  <text x="560" y="205" class="lbl">▶ 確認ポイント</text>
  <text x="560" y="228" class="note">・「入れにいく」だけに</text>
  <text x="560" y="246" class="note">　なっていないか</text>
  <text x="560" y="270" class="note">・左踵の踏み込みが</text>
  <text x="560" y="288" class="note">　効いているか</text>
  <text x="560" y="312" class="note">・運動連鎖が消えていないか</text>

  <rect x="550" y="350" width="220" height="40" rx="6" fill="#e67e22" opacity="0.1"/>
  <text x="660" y="368" class="lbl" text-anchor="middle" fill="#d35400" font-weight="700">入っても体で打ったか</text>
  <text x="660" y="385" class="note" text-anchor="middle" fill="#d35400">→ 質を意識する</text>

  <!-- bottom note -->
  <text x="400" y="440" class="cap" text-anchor="middle">＊3つに絞ると、対人ラリー後の振り返りが具体的になる</text>
</svg>
