<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="テニスのサーブの球種別トス位置マップ｜フラット・スライス・スピン・キックそれぞれのトス位置を真上から見た図">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 700; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect width="800" height="540" fill="#f8fafa"/>
  <text x="400" y="38" class="ttl" text-anchor="middle">球種別トス位置マップ｜真上から見た図（右利き）</text>
  <text x="400" y="60" class="cap" text-anchor="middle">＊プレーヤーの頭を中心に、ネット側＝前、ベースライン側＝後ろ</text>

  <!-- Court reference frame -->
  <rect x="200" y="100" width="400" height="380" fill="#f3f9f3" stroke="#ccc" stroke-width="1"/>

  <!-- Net (top) -->
  <line x1="200" y1="120" x2="600" y2="120" stroke="#3498db" stroke-width="3"/>
  <text x="400" y="113" class="note" text-anchor="middle" fill="#3498db" font-weight="700">↑ ネット側（前）</text>

  <!-- Baseline (bottom) -->
  <line x1="200" y1="460" x2="600" y2="460" stroke="#27ae60" stroke-width="3"/>
  <text x="400" y="478" class="note" text-anchor="middle" fill="#27ae60" font-weight="700">↓ ベースライン側（後ろ）</text>

  <!-- Center vertical line through player (head) -->
  <line x1="400" y1="120" x2="400" y2="460" stroke="#bbb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Player position (head from above) -->
  <circle cx="400" cy="370" r="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <text x="400" y="375" class="note" text-anchor="middle" font-weight="700">頭</text>

  <!-- Feet -->
  <ellipse cx="378" cy="420" rx="11" ry="7" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="378" y="424" class="note" text-anchor="middle" font-size="9">左</text>
  <ellipse cx="422" cy="420" rx="11" ry="7" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="422" y="424" class="note" text-anchor="middle" font-size="9">右</text>

  <!-- Left/right axis indicator -->
  <text x="220" y="375" class="note" text-anchor="start" fill="#888">← 左</text>
  <text x="580" y="375" class="note" text-anchor="end" fill="#888">右（利き手側）→</text>

  <!-- ===== Toss positions ===== -->

  <!-- 1. FLAT: 前 × やや右 -->
  <circle cx="440" cy="220" r="14" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <text x="440" y="225" class="stl" text-anchor="middle">F</text>
  <line x1="440" y1="220" x2="440" y2="370" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Label box -->
  <rect x="620" y="195" width="160" height="46" rx="6" fill="#e74c3c"/>
  <text x="700" y="215" class="stl" text-anchor="middle">F：フラット</text>
  <text x="700" y="232" class="note" text-anchor="middle" fill="#fff">前 × やや右</text>
  <line x1="455" y1="220" x2="618" y2="218" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 2. SLICE: 前 × 右寄り -->
  <circle cx="490" cy="270" r="14" fill="#e67e22" stroke="#fff" stroke-width="2"/>
  <text x="490" y="275" class="stl" text-anchor="middle">SL</text>
  <line x1="490" y1="270" x2="490" y2="370" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Label box -->
  <rect x="620" y="255" width="160" height="46" rx="6" fill="#e67e22"/>
  <text x="700" y="275" class="stl" text-anchor="middle">SL：スライス</text>
  <text x="700" y="292" class="note" text-anchor="middle" fill="#fff">前 × 利き手側</text>
  <line x1="505" y1="270" x2="618" y2="278" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 3. SPIN: 真上〜やや後ろ × 真上 -->
  <circle cx="395" cy="290" r="14" fill="#3498db" stroke="#fff" stroke-width="2"/>
  <text x="395" y="295" class="stl" text-anchor="middle">SP</text>
  <line x1="395" y1="290" x2="395" y2="370" stroke="#3498db" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Label box -->
  <rect x="20" y="225" width="160" height="46" rx="6" fill="#3498db"/>
  <text x="100" y="245" class="stl" text-anchor="middle">SP：スピン</text>
  <text x="100" y="262" class="note" text-anchor="middle" fill="#fff">やや後ろ × 真上</text>
  <line x1="180" y1="265" x2="380" y2="290" stroke="#3498db" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 4. KICK: 後ろ × 左 -->
  <circle cx="350" cy="330" r="14" fill="#9b59b6" stroke="#fff" stroke-width="2"/>
  <text x="350" y="335" class="stl" text-anchor="middle">K</text>
  <line x1="350" y1="330" x2="395" y2="370" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Label box -->
  <rect x="20" y="305" width="160" height="46" rx="6" fill="#9b59b6"/>
  <text x="100" y="325" class="stl" text-anchor="middle">K：キック</text>
  <text x="100" y="342" class="note" text-anchor="middle" fill="#fff">後ろ × 左</text>
  <line x1="180" y1="328" x2="335" y2="330" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Summary at bottom -->
  <rect x="60" y="500" width="680" height="30" rx="6" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="520" class="note" text-anchor="middle" fill="#2980b9" font-weight="700">フラット → スライス → スピン → キック の順に「前→後ろ」「右→左」へシフト</text>
</svg>
