<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ts1Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
    <marker id="ts1ArrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="380" y="24" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">サービスダッシュ｜トス→打つ→左足で着地→右足で一歩前へ</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">ポイント：ボールを通常より前に上げる</text>

  <!-- Court ground line -->
  <line x1="20" y1="320" x2="740" y2="320" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="20" y1="320" x2="740" y2="320" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Baseline label -->
  <text x="50" y="338" font-size="10" fill="#27ae60" font-weight="bold">ベースライン</text>

  <!-- ===== Panel 1: Toss (forward) ===== -->
  <g>
    <text x="100" y="365" text-anchor="middle" font-size="13" fill="#3498db" font-weight="bold">①トスを前に</text>
    <!-- Body -->
    <circle cx="100" cy="100" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M 90 114 Q 85 180 95 240 Q 105 245 115 240 Q 125 180 110 114 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Arm tossing forward -->
    <path d="M 110 130 Q 130 100 145 75" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Other arm (racket) -->
    <path d="M 92 130 Q 75 170 80 200" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Racket -->
    <ellipse cx="78" cy="215" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Legs -->
    <rect x="93" y="240" width="8" height="78" fill="#aaa" rx="2"/>
    <rect x="105" y="240" width="8" height="78" fill="#aaa" rx="2"/>
    <!-- Ball thrown forward (with arc) -->
    <circle cx="155" cy="60" r="6" fill="#f1c40f" stroke="#b7950b" stroke-width="1.5"/>
    <path d="M 145 75 Q 152 50 155 60" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>
    <!-- Forward arrow -->
    <line x1="100" y1="280" x2="155" y2="280" stroke="#c0392b" stroke-width="2.5" marker-end="url(#ts1ArrowR)"/>
    <text x="125" y="296" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">前方へ</text>
  </g>

  <!-- ===== Panel 2: Contact (jump) ===== -->
  <g>
    <text x="270" y="365" text-anchor="middle" font-size="13" fill="#3498db" font-weight="bold">②打つ（ジャンプ）</text>
    <!-- Body in air -->
    <circle cx="270" cy="80" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M 260 94 Q 255 160 265 220 Q 275 225 285 220 Q 295 160 280 94 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Hitting arm UP -->
    <path d="M 280 110 Q 295 75 295 50" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Racket up -->
    <ellipse cx="295" cy="38" rx="9" ry="13" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Other arm -->
    <path d="M 262 110 Q 250 140 255 165" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Ball at contact -->
    <circle cx="295" cy="35" r="6" fill="#f1c40f" stroke="#b7950b" stroke-width="1.5"/>
    <!-- Both legs in air -->
    <rect x="263" y="220" width="8" height="60" fill="#aaa" rx="2"/>
    <rect x="275" y="220" width="8" height="60" fill="#aaa" rx="2"/>
    <!-- Air gap (feet OFF ground) -->
    <text x="270" y="305" text-anchor="middle" font-size="10" fill="#3498db">空中</text>
  </g>

  <!-- ===== Panel 3: Land on LEFT foot ===== -->
  <g>
    <text x="450" y="365" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">③左足で着地</text>
    <!-- Body slightly leaning forward -->
    <circle cx="445" cy="105" r="14" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <path d="M 433 119 Q 430 180 442 240 Q 455 245 462 240 Q 470 180 455 119 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="1.5"/>
    <!-- Arms following through -->
    <path d="M 458 135 Q 480 170 475 210" stroke="#1e8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 435 135 Q 415 170 420 210" stroke="#1e8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- LEFT leg landed (RED highlight) - vertical, supporting -->
    <rect x="445" y="240" width="9" height="78" fill="#f9d7d3" stroke="#c0392b" stroke-width="2" rx="2"/>
    <!-- LEFT foot - large, bold -->
    <ellipse cx="450" cy="320" rx="18" ry="6" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <text x="450" y="324" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">左足</text>
    <!-- RIGHT leg lifted/back -->
    <rect x="430" y="240" width="8" height="50" fill="#ddd" stroke="#aaa" rx="2"/>
    <ellipse cx="425" cy="295" rx="10" ry="3" fill="#ddd" stroke="#aaa"/>
    <!-- Callout -->
    <text x="385" y="270" font-size="11" fill="#c0392b" font-weight="bold">左足で</text>
    <text x="385" y="284" font-size="11" fill="#c0392b" font-weight="bold">着地</text>
    <line x1="415" y1="278" x2="442" y2="305" stroke="#c0392b" stroke-width="2" marker-end="url(#ts1ArrowR)"/>
  </g>

  <!-- ===== Panel 4: Step forward with RIGHT foot ===== -->
  <g>
    <text x="640" y="365" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">④右足を一歩前へ</text>
    <!-- Body moving forward -->
    <circle cx="635" cy="105" r="14" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <path d="M 623 119 Q 620 180 632 240 Q 645 245 652 240 Q 660 180 645 119 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="1.5"/>
    <!-- Arms forward -->
    <path d="M 648 135 Q 670 170 680 200" stroke="#1e8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 625 135 Q 615 170 620 200" stroke="#1e8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- LEFT leg behind (planted) -->
    <rect x="625" y="240" width="9" height="78" fill="#bbb" stroke="#888" rx="2"/>
    <ellipse cx="628" cy="320" rx="13" ry="5" fill="#bbb" stroke="#888"/>
    <text x="628" y="324" text-anchor="middle" font-size="8" fill="#444">左</text>
    <!-- RIGHT leg STEPPING FORWARD (RED) - angled forward -->
    <polygon points="645,240 655,240 690,318 680,320" fill="#f9d7d3" stroke="#c0392b" stroke-width="2"/>
    <ellipse cx="690" cy="320" rx="18" ry="6" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <text x="690" y="324" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">右足</text>
    <!-- Forward direction arrow -->
    <line x1="635" y1="290" x2="700" y2="290" stroke="#c0392b" stroke-width="2.5" marker-end="url(#ts1ArrowR)"/>
    <text x="668" y="282" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">ネット方向へ</text>
  </g>

  <!-- Step transition arrows between panels -->
  <line x1="170" y1="180" x2="215" y2="180" stroke="#3498db" stroke-width="2.5" marker-end="url(#ts1Arrow)"/>
  <line x1="335" y1="180" x2="385" y2="180" stroke="#3498db" stroke-width="2.5" marker-end="url(#ts1Arrow)"/>
  <line x1="510" y1="180" x2="565" y2="180" stroke="#3498db" stroke-width="2.5" marker-end="url(#ts1Arrow)"/>
</svg>
