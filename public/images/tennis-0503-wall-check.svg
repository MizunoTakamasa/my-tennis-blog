<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <rect width="800" height="460" fill="#fafafa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#222">壁を使った「反り腰チェック」</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#666">かかと・お尻・背中・後頭部を壁につけて立ち、腰と壁の隙間に手を差し込みます</text>

  <!-- Left: NG (big gap) -->
  <text x="200" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#c0392b">NG：手のひらが余裕で入る</text>

  <!-- wall -->
  <line x1="100" y1="120" x2="100" y2="420" stroke="#888" stroke-width="3"/>
  <text x="85" y="115" text-anchor="middle" font-size="11" fill="#888">壁</text>

  <!-- person leaning on wall with sway -->
  <!-- head touches wall -->
  <circle cx="120" cy="150" r="18" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <!-- spine: large arch away from wall -->
  <path d="M 118 168 C 130 210, 165 240, 130 280 C 110 310, 130 340, 122 380" fill="none" stroke="#c0392b" stroke-width="3"/>
  <!-- gap arrow at lumbar -->
  <line x1="100" y1="290" x2="158" y2="290" stroke="#e67e22" stroke-width="2" marker-end="url(#arr4)" marker-start="url(#arr4r)"/>
  <text x="170" y="294" font-size="13" fill="#e67e22" font-weight="600">手が余裕で入る = 反り腰</text>
  <!-- buttocks on wall -->
  <ellipse cx="115" cy="385" rx="18" ry="12" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <!-- legs -->
  <line x1="110" y1="397" x2="105" y2="450" stroke="#c0392b" stroke-width="3"/>
  <line x1="125" y1="397" x2="125" y2="450" stroke="#c0392b" stroke-width="3"/>
  <!-- floor -->
  <line x1="80" y1="450" x2="370" y2="450" stroke="#999" stroke-width="2"/>

  <!-- Right: OK (palm just fits) -->
  <text x="600" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#1f8a4c">OK：手の甲が軽く入る程度</text>

  <line x1="500" y1="120" x2="500" y2="420" stroke="#888" stroke-width="3"/>
  <text x="485" y="115" text-anchor="middle" font-size="11" fill="#888">壁</text>

  <circle cx="520" cy="150" r="18" fill="none" stroke="#1f8a4c" stroke-width="2.5"/>
  <!-- gentle natural curve, small gap -->
  <path d="M 518 168 C 522 210, 530 240, 524 280 C 520 310, 522 350, 520 385" fill="none" stroke="#1f8a4c" stroke-width="3"/>
  <line x1="500" y1="285" x2="525" y2="285" stroke="#1f8a4c" stroke-width="2" marker-end="url(#arr5)" marker-start="url(#arr5r)"/>
  <text x="540" y="289" font-size="13" fill="#1f8a4c" font-weight="600">手の甲くらい = ニュートラル</text>
  <ellipse cx="515" cy="390" rx="18" ry="12" fill="none" stroke="#1f8a4c" stroke-width="2.5"/>
  <line x1="510" y1="402" x2="505" y2="450" stroke="#1f8a4c" stroke-width="3"/>
  <line x1="525" y1="402" x2="525" y2="450" stroke="#1f8a4c" stroke-width="3"/>
  <line x1="480" y1="450" x2="780" y2="450" stroke="#999" stroke-width="2"/>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
    <marker id="arr4r" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#e67e22"/>
    </marker>
    <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f8a4c"/>
    </marker>
    <marker id="arr5r" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#1f8a4c"/>
    </marker>
  </defs>
</svg>
