<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="pcArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="pcArrB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2874a6"/>
    </marker>
    <marker id="pcArrG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e8449"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">ポーチの基本｜ダブルスでネットマンが横取りする動き</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">本来パートナーが取るボールを、前衛が横切って決めにいく</text>

  <!-- ============ Court ============ -->
  <!-- Court outer -->
  <rect x="180" y="80" width="460" height="380" fill="#5dade2" stroke="#1b4f72" stroke-width="2.5"/>

  <!-- Doubles sidelines (outer) and singles sidelines (inner) -->
  <line x1="220" y1="80" x2="220" y2="460" stroke="#fff" stroke-width="2"/>
  <line x1="600" y1="80" x2="600" y2="460" stroke="#fff" stroke-width="2"/>

  <!-- Net (center horizontal) -->
  <line x1="180" y1="270" x2="640" y2="270" stroke="#fff" stroke-width="3"/>
  <text x="170" y="275" text-anchor="end" font-size="11" fill="#1b4f72" font-weight="bold">ネット</text>

  <!-- Service lines -->
  <line x1="220" y1="170" x2="600" y2="170" stroke="#fff" stroke-width="2"/>
  <line x1="220" y1="370" x2="600" y2="370" stroke="#fff" stroke-width="2"/>

  <!-- Center service line -->
  <line x1="410" y1="170" x2="410" y2="370" stroke="#fff" stroke-width="2"/>

  <!-- Center mark -->
  <line x1="410" y1="80" x2="410" y2="100" stroke="#fff" stroke-width="2"/>
  <line x1="410" y1="440" x2="410" y2="460" stroke="#fff" stroke-width="2"/>

  <!-- ============ Players ============ -->
  <!-- Top side: opponents -->
  <!-- Opponent server (back, deuce side) -->
  <circle cx="320" cy="105" r="11" fill="#7f8c8d" stroke="#34495e" stroke-width="1.5"/>
  <text x="320" y="109" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">敵B</text>
  <text x="320" y="78" text-anchor="middle" font-size="9" fill="#34495e">後衛</text>

  <!-- Opponent net player -->
  <circle cx="500" cy="220" r="11" fill="#7f8c8d" stroke="#34495e" stroke-width="1.5"/>
  <text x="500" y="224" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">敵A</text>
  <text x="500" y="248" text-anchor="middle" font-size="9" fill="#34495e">前衛</text>

  <!-- Bottom side: us -->
  <!-- Our server (back) - shows hit -->
  <circle cx="500" cy="435" r="11" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="500" y="439" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">味方</text>
  <text x="500" y="465" text-anchor="middle" font-size="9" fill="#1e8449">後衛</text>

  <!-- Our net player BEFORE poach (deuce side, near sideline) -->
  <circle cx="280" cy="350" r="11" fill="#e74c3c" stroke="#922b21" stroke-width="1.5" opacity="0.45"/>
  <text x="280" y="354" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">自分</text>
  <text x="232" y="345" text-anchor="middle" font-size="9" fill="#922b21" opacity="0.7">①待機</text>
  <text x="232" y="360" text-anchor="middle" font-size="9" fill="#922b21" opacity="0.7">（前衛）</text>

  <!-- Our net player AFTER poach (moved across) -->
  <circle cx="450" cy="320" r="13" fill="#e74c3c" stroke="#922b21" stroke-width="2"/>
  <text x="450" y="324" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">自分</text>
  <text x="450" y="350" text-anchor="middle" font-size="9" fill="#922b21" font-weight="bold">②飛び出す</text>

  <!-- Movement arrow for poach -->
  <path d="M 295 345 Q 370 320 435 320" stroke="#c0392b" stroke-width="3" fill="none" marker-end="url(#pcArr)" stroke-dasharray="6,3"/>
  <text x="365" y="305" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">ポーチで飛び出す</text>

  <!-- Ball trajectory: opponent's return going to our backhand side, but we cut it off -->
  <!-- Ball from opponent server to our backhand (would normally go to our partner) -->
  <path d="M 320 115 Q 380 250 450 320" stroke="#f39c12" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <circle cx="380" cy="200" r="5" fill="#f39c12" stroke="#9c640c" stroke-width="1"/>
  <text x="380" y="190" text-anchor="middle" font-size="9" fill="#9c640c" font-weight="bold">球</text>

  <!-- Where the ball would have gone (without poach) -->
  <path d="M 450 320 L 540 430" stroke="#7f8c8d" stroke-width="1.5" fill="none" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="540" y="395" text-anchor="middle" font-size="8" fill="#7f8c8d" font-style="italic">本来は味方が取る球</text>

  <!-- Outgoing shot after poach -->
  <line x1="465" y1="310" x2="540" y2="160" stroke="#c0392b" stroke-width="2.5" marker-end="url(#pcArr)"/>
  <text x="555" y="160" text-anchor="start" font-size="10" fill="#c0392b" font-weight="bold">敵の足元へ決める</text>

  <!-- ============ Side panel: 3 conditions ============ -->
  <rect x="660" y="80" width="150" height="380" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5" rx="4"/>
  <text x="735" y="103" text-anchor="middle" font-size="13" fill="#7d6608" font-weight="bold">ポーチの3条件</text>
  <line x1="675" y1="113" x2="795" y2="113" stroke="#d4ac0d" stroke-width="1"/>

  <text x="670" y="135" font-size="11" fill="#7d6608" font-weight="bold">①タイミング</text>
  <text x="670" y="152" font-size="9" fill="#7d6608">相手の打つ瞬間</text>
  <text x="670" y="166" font-size="9" fill="#7d6608">に動き出す</text>

  <text x="670" y="195" font-size="11" fill="#7d6608" font-weight="bold">②コース予測</text>
  <text x="670" y="212" font-size="9" fill="#7d6608">浅い・甘い球を</text>
  <text x="670" y="226" font-size="9" fill="#7d6608">狙う（深い球は×）</text>

  <text x="670" y="255" font-size="11" fill="#7d6608" font-weight="bold">③決めるコース</text>
  <text x="670" y="272" font-size="9" fill="#7d6608">敵の足元</text>
  <text x="670" y="286" font-size="9" fill="#7d6608">またはセンター</text>

  <line x1="675" y1="305" x2="795" y2="305" stroke="#d4ac0d" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="735" y="325" text-anchor="middle" font-size="11" fill="#7d6608" font-weight="bold">大事なこと</text>
  <text x="670" y="345" font-size="10" fill="#7d6608">行くと決めたら</text>
  <text x="670" y="360" font-size="10" fill="#7d6608" font-weight="bold">迷わない</text>
  <text x="670" y="380" font-size="10" fill="#7d6608">中途半端が</text>
  <text x="670" y="395" font-size="10" fill="#7d6608" font-weight="bold">一番ダメ</text>

  <text x="735" y="425" text-anchor="middle" font-size="9" fill="#7d6608" font-style="italic">空けたサイドは</text>
  <text x="735" y="440" text-anchor="middle" font-size="9" fill="#7d6608" font-style="italic">パートナーが</text>
  <text x="735" y="455" text-anchor="middle" font-size="9" fill="#7d6608" font-style="italic">カバー</text>

  <!-- ============ Bottom legend ============ -->
  <rect x="20" y="475" width="630" height="35" fill="#f4f6f6" stroke="#566573" stroke-width="1" rx="4"/>
  <circle cx="40" cy="492" r="6" fill="#27ae60"/>
  <text x="55" y="496" font-size="10" fill="#222">味方（後衛）</text>

  <circle cx="155" cy="492" r="6" fill="#e74c3c"/>
  <text x="170" y="496" font-size="10" fill="#222">自分（前衛・ポーチする側）</text>

  <circle cx="345" cy="492" r="6" fill="#7f8c8d"/>
  <text x="360" y="496" font-size="10" fill="#222">相手</text>

  <circle cx="410" cy="492" r="5" fill="#f39c12"/>
  <text x="425" y="496" font-size="10" fill="#222">ボール</text>

  <line x1="490" y1="492" x2="520" y2="492" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="530" y="496" font-size="10" fill="#222">ポーチの動き</text>
</svg>
