<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="下半身リードから体の張り、ラケットのしなりまでの連鎖図">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f8e9"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bgC)"/>

  <g font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif">
    <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="800" fill="#1b5e20">体の張りを使ったショットの連鎖</text>
    <text x="600" y="85" text-anchor="middle" font-size="16" font-weight="500" fill="#33691e">時間さえあれば、この順番が自然に出る</text>

    <!-- Boxes in chain -->
    <g>
      <!-- 1 -->
      <rect x="40" y="160" width="240" height="180" rx="14" fill="#1b5e20"/>
      <text x="160" y="200" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">①</text>
      <text x="160" y="245" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">下半身リード</text>
      <text x="160" y="285" text-anchor="middle" font-size="14" fill="#c5e1a5">足→腰の順で動き出す</text>
      <text x="160" y="310" text-anchor="middle" font-size="14" fill="#c5e1a5">上半身は遅れて連動</text>

      <!-- arrow 1 -->
      <polygon points="285,250 320,235 320,265" fill="#558b2f"/>

      <!-- 2 -->
      <rect x="330" y="160" width="240" height="180" rx="14" fill="#2e7d32"/>
      <text x="450" y="200" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">②</text>
      <text x="450" y="245" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">体の張り</text>
      <text x="450" y="285" text-anchor="middle" font-size="14" fill="#c5e1a5">下半身と上半身の</text>
      <text x="450" y="310" text-anchor="middle" font-size="14" fill="#c5e1a5">捻転差を作る</text>

      <!-- arrow 2 -->
      <polygon points="575,250 610,235 610,265" fill="#558b2f"/>

      <!-- 3 -->
      <rect x="620" y="160" width="240" height="180" rx="14" fill="#388e3c"/>
      <text x="740" y="200" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">③</text>
      <text x="740" y="245" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">体をしならせる</text>
      <text x="740" y="285" text-anchor="middle" font-size="14" fill="#c5e1a5">張った体を解放し</text>
      <text x="740" y="310" text-anchor="middle" font-size="14" fill="#c5e1a5">エネルギーを伝える</text>

      <!-- arrow 3 -->
      <polygon points="865,250 900,235 900,265" fill="#558b2f"/>

      <!-- 4 -->
      <rect x="910" y="160" width="240" height="180" rx="14" fill="#43a047"/>
      <text x="1030" y="200" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">④</text>
      <text x="1030" y="245" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">ラケットがしなる</text>
      <text x="1030" y="285" text-anchor="middle" font-size="14" fill="#fff59d">最後にラケットが</text>
      <text x="1030" y="310" text-anchor="middle" font-size="14" fill="#fff59d">ボールに当たる</text>
    </g>

    <!-- bottom note -->
    <rect x="40" y="400" width="1120" height="60" rx="12" fill="#ffffff" stroke="#1b5e20" stroke-width="2"/>
    <text x="600" y="438" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">「打つまでの時間」がなければ、この連鎖は出ない</text>
  </g>
</svg>
