<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="tr1Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <text x="400" y="24" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">軸足を鍛える｜大腰筋トレーニング 4ステップ</text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#555">1セット 10回（左右5回ずつ）× 2セット ／ 慣れたら踏み出した方向に上半身をひねる</text>

  <!-- Ground -->
  <line x1="20" y1="320" x2="780" y2="320" stroke="#7f8c8d" stroke-width="2"/>

  <!-- ===== Step 1: 直立 ===== -->
  <g>
    <text x="100" y="365" text-anchor="middle" font-size="13" fill="#3498db" font-weight="bold">①直立姿勢</text>
    <!-- Head -->
    <circle cx="100" cy="100" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Body -->
    <path d="M 90 114 Q 86 180 92 240 Q 100 245 108 240 Q 114 180 110 114 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Arms straight down -->
    <line x1="92" y1="135" x2="85" y2="220" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="108" y1="135" x2="115" y2="220" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Both legs -->
    <rect x="93" y="240" width="8" height="78" fill="#aaa" stroke="#888" rx="2"/>
    <rect x="99" y="240" width="8" height="78" fill="#aaa" stroke="#888" rx="2"/>
    <!-- Feet -->
    <ellipse cx="97" cy="320" rx="9" ry="3" fill="#bbb" stroke="#888"/>
    <ellipse cx="103" cy="320" rx="9" ry="3" fill="#bbb" stroke="#888"/>
  </g>

  <!-- ===== Step 2: 片脚を上げる ===== -->
  <g>
    <text x="280" y="365" text-anchor="middle" font-size="13" fill="#3498db" font-weight="bold">②片脚を上げる</text>
    <!-- Head -->
    <circle cx="280" cy="100" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Body slight balance -->
    <path d="M 270 114 Q 265 180 275 240 Q 285 245 293 240 Q 295 180 290 114 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Arms balance -->
    <line x1="270" y1="135" x2="255" y2="190" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="290" y1="135" x2="305" y2="190" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Standing leg (left, on ground) -->
    <rect x="277" y="240" width="9" height="78" fill="#aaa" stroke="#888" rx="2"/>
    <ellipse cx="282" cy="320" rx="11" ry="4" fill="#bbb" stroke="#888"/>
    <!-- Lifted leg (right, raised) - GREEN -->
    <path d="M 290 240 Q 305 250 310 270" stroke="#27ae60" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="313" cy="273" rx="9" ry="3" fill="#27ae60"/>
    <!-- Up arrow -->
    <line x1="325" y1="290" x2="325" y2="265" stroke="#27ae60" stroke-width="2" marker-end="url(#tr1Arrow)"/>
  </g>

  <!-- ===== Step 3: 大きく前に踏み出す（膝90度） ===== -->
  <g>
    <text x="475" y="365" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">③前に踏み出す（膝90°）</text>
    <!-- Head -->
    <circle cx="450" cy="100" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Body upright -->
    <path d="M 440 114 Q 436 180 445 240 Q 455 245 462 240 Q 466 180 460 114 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="440" y1="135" x2="425" y2="200" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="460" y1="135" x2="475" y2="200" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- BACK leg (extended straight) -->
    <line x1="445" y1="245" x2="425" y2="320" stroke="#aaa" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="421" cy="320" rx="11" ry="4" fill="#bbb" stroke="#888"/>
    <text x="421" y="338" text-anchor="middle" font-size="9" fill="#777">後足を伸ばす</text>
    <!-- FRONT leg stepping forward (knee bent 90°, RED) -->
    <!-- Thigh forward to knee -->
    <line x1="460" y1="245" x2="510" y2="270" stroke="#c0392b" stroke-width="10" stroke-linecap="round"/>
    <!-- Shin from knee straight down (90deg knee) -->
    <line x1="510" y1="270" x2="510" y2="320" stroke="#c0392b" stroke-width="10" stroke-linecap="round"/>
    <!-- Knee marker -->
    <circle cx="510" cy="270" r="5" fill="#fff" stroke="#c0392b" stroke-width="2"/>
    <!-- Foot -->
    <ellipse cx="515" cy="320" rx="14" ry="5" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <!-- 90 deg label -->
    <path d="M 502 270 Q 502 278 510 278" stroke="#c0392b" stroke-width="1.5" fill="none"/>
    <text x="495" y="295" font-size="10" fill="#c0392b" font-weight="bold">90°</text>
    <!-- Forward arrow (moved to upper-right empty area to avoid title overlap) -->
    <line x1="470" y1="160" x2="540" y2="195" stroke="#c0392b" stroke-width="2.5" marker-end="url(#tr1Arrow)"/>
    <text x="555" y="150" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">大きく前へ</text>
  </g>

  <!-- ===== Step 4: 戻して、脚を変えて繰り返す ===== -->
  <g>
    <text x="700" y="365" text-anchor="middle" font-size="13" fill="#3498db" font-weight="bold">④戻して脚を変える</text>
    <!-- Head -->
    <circle cx="700" cy="100" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Body -->
    <path d="M 690 114 Q 686 180 692 240 Q 700 245 708 240 Q 714 180 710 114 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Arms balance -->
    <line x1="690" y1="135" x2="675" y2="190" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="710" y1="135" x2="725" y2="190" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Standing leg (right side now) -->
    <rect x="697" y="240" width="9" height="78" fill="#aaa" stroke="#888" rx="2"/>
    <ellipse cx="702" cy="320" rx="11" ry="4" fill="#bbb" stroke="#888"/>
    <!-- Lifted leg (left now) - GREEN -->
    <path d="M 690 240 Q 675 250 670 270" stroke="#27ae60" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="667" cy="273" rx="9" ry="3" fill="#27ae60"/>
    <!-- Loop arrow indicating repeat -->
    <text x="755" y="200" font-size="22" fill="#3498db">↺</text>
    <text x="745" y="225" font-size="10" fill="#3498db" font-weight="bold">左右5回</text>
  </g>

  <!-- Transition arrows -->
  <line x1="135" y1="200" x2="180" y2="200" stroke="#3498db" stroke-width="2.5" marker-end="url(#tr1Arrow)"/>
  <line x1="335" y1="200" x2="380" y2="200" stroke="#3498db" stroke-width="2.5" marker-end="url(#tr1Arrow)"/>
  <line x1="555" y1="200" x2="610" y2="200" stroke="#3498db" stroke-width="2.5" marker-end="url(#tr1Arrow)"/>
</svg>
