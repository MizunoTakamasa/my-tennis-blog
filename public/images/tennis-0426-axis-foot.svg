<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ax1Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <text x="350" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">フォアハンド｜右足軸 と 左足軸 を使い分ける</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#555">右利きプレーヤーの場合・状況に応じて両方使えるのが上達のカギ</text>

  <!-- Ground -->
  <line x1="20" y1="320" x2="680" y2="320" stroke="#7f8c8d" stroke-width="2"/>

  <!-- ===== LEFT: 右足軸 (Right foot as axis) ===== -->
  <g>
    <!-- Title bar -->
    <rect x="40" y="70" width="280" height="28" fill="#c0392b" rx="4"/>
    <text x="180" y="89" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①右足軸（後ろ足を軸）</text>

    <!-- Body (slightly shifted to viewer's LEFT = player's RIGHT/back foot side) -->
    <circle cx="195" cy="135" r="16" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M 210 151 Q 218 220 205 280 Q 185 285 175 280 Q 168 220 180 151 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Hitting arm extended to viewer's LEFT (player's natural swing direction) -->
    <path d="M 180 175 Q 145 205 120 220" stroke="#333" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="110" cy="225" rx="10" ry="14" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Other arm -->
    <path d="M 208 175 Q 225 200 220 225" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- LEFT foot of player (light, viewer's RIGHT) - ATTACHED to body -->
    <rect x="195" y="280" width="10" height="38" fill="#ddd" stroke="#aaa" rx="2"/>
    <ellipse cx="208" cy="320" rx="14" ry="5" fill="#ddd" stroke="#aaa"/>
    <text x="208" y="335" text-anchor="middle" font-size="9" fill="#777">左足</text>

    <!-- RIGHT foot of player (BACK = AXIS, RED, viewer's LEFT) - ATTACHED to body -->
    <rect x="173" y="280" width="11" height="38" fill="#f9d7d3" stroke="#c0392b" stroke-width="2.5" rx="2"/>
    <ellipse cx="172" cy="320" rx="20" ry="7" fill="#e74c3c" stroke="#a93226" stroke-width="2.5"/>
    <text x="172" y="324" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">右足（軸）</text>

    <!-- Toe direction (斜め前) -->
    <line x1="172" y1="320" x2="138" y2="335" stroke="#c0392b" stroke-width="2" marker-end="url(#ax1Arrow)"/>
    <text x="125" y="338" text-anchor="end" font-size="10" fill="#c0392b" font-weight="bold">つま先=斜め前</text>

    <!-- Use cases -->
    <rect x="40" y="350" width="280" height="120" fill="#fef5f4" stroke="#c0392b" stroke-width="1.5" rx="4"/>
    <text x="180" y="370" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">こんな時に使う</text>
    <text x="55" y="390" font-size="11" fill="#333">・深いショットを下がって打つとき</text>
    <text x="55" y="408" font-size="11" fill="#333">・サイドに振られたとき</text>
    <text x="55" y="426" font-size="11" fill="#333">・オープンスタンスで打つとき</text>
    <text x="55" y="444" font-size="11" fill="#333">・ボールを深く打ちたいとき</text>
    <text x="55" y="462" font-size="10" fill="#a93226" font-weight="bold">→ 内側にねじり戻されてパワー増</text>
  </g>

  <!-- ===== RIGHT: 左足軸 (Left foot as axis) ===== -->
  <g>
    <!-- Title bar -->
    <rect x="380" y="70" width="280" height="28" fill="#1e8449" rx="4"/>
    <text x="520" y="89" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②左足軸（前足を軸・踏み込み）</text>

    <!-- Body (shifted to viewer's RIGHT = player's LEFT/front foot side) -->
    <circle cx="505" cy="135" r="16" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M 520 151 Q 528 220 515 280 Q 495 285 485 280 Q 478 220 490 151 Z" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <!-- Hitting arm follow-through (to viewer's LEFT after swing) -->
    <path d="M 488 175 Q 453 200 430 215" stroke="#333" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="420" cy="220" rx="10" ry="14" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Other arm -->
    <path d="M 518 175 Q 535 200 530 225" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- LEFT foot of player (FRONT = AXIS, GREEN, viewer's RIGHT) - ATTACHED to body -->
    <rect x="510" y="280" width="11" height="38" fill="#d5f5e3" stroke="#1e8449" stroke-width="2.5" rx="2"/>
    <ellipse cx="513" cy="320" rx="20" ry="7" fill="#27ae60" stroke="#0e6251" stroke-width="2.5"/>
    <text x="513" y="324" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">左足（軸）</text>

    <!-- RIGHT foot of player (back, light, viewer's LEFT) - ATTACHED to body -->
    <rect x="483" y="280" width="10" height="38" fill="#ddd" stroke="#aaa" rx="2"/>
    <ellipse cx="478" cy="320" rx="14" ry="5" fill="#ddd" stroke="#aaa"/>
    <text x="478" y="335" text-anchor="middle" font-size="9" fill="#777">右足</text>

    <!-- Forward direction arrow (踏み込み - toward left foot) -->
    <line x1="475" y1="345" x2="513" y2="345" stroke="#1e8449" stroke-width="2.5" marker-end="url(#ax1Arrow)"/>
    <text x="494" y="362" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">踏み込み</text>

    <!-- Use cases -->
    <rect x="380" y="370" width="280" height="100" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
    <text x="520" y="390" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">こんな時に使う</text>
    <text x="395" y="410" font-size="11" fill="#333">・スクールの基本の打ち方</text>
    <text x="395" y="428" font-size="11" fill="#333">・踏み込んで打つとき</text>
    <text x="395" y="446" font-size="11" fill="#333">・アプローチショット</text>
    <text x="395" y="463" font-size="10" fill="#0e6251" font-weight="bold">→ 体重を前に乗せやすい</text>
  </g>
</svg>
