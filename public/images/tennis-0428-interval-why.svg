<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ivArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">なぜテニスにはインターバルトレーニングが効くのか</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">試合のリズムが、まさにインターバルそのもの</text>

  <!-- ============ Top half: actual match rhythm ============ -->
  <text x="20" y="80" font-size="14" fill="#222" font-weight="bold">▶ 1ポイントの流れ</text>
  <rect x="20" y="90" width="780" height="120" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" rx="4"/>

  <!-- Timeline axis -->
  <line x1="40" y1="155" x2="780" y2="155" stroke="#34495e" stroke-width="2"/>

  <!-- Time labels (seconds) -->
  <text x="40" y="195" text-anchor="middle" font-size="9" fill="#566573">0秒</text>
  <text x="180" y="195" text-anchor="middle" font-size="9" fill="#566573">10秒</text>
  <text x="320" y="195" text-anchor="middle" font-size="9" fill="#566573">30秒</text>
  <text x="460" y="195" text-anchor="middle" font-size="9" fill="#566573">40秒</text>
  <text x="600" y="195" text-anchor="middle" font-size="9" fill="#566573">60秒</text>
  <text x="740" y="195" text-anchor="middle" font-size="9" fill="#566573">70秒</text>

  <!-- Tick marks -->
  <line x1="40" y1="150" x2="40" y2="160" stroke="#34495e" stroke-width="1.5"/>
  <line x1="180" y1="150" x2="180" y2="160" stroke="#34495e" stroke-width="1.5"/>
  <line x1="320" y1="150" x2="320" y2="160" stroke="#34495e" stroke-width="1.5"/>
  <line x1="460" y1="150" x2="460" y2="160" stroke="#34495e" stroke-width="1.5"/>
  <line x1="600" y1="150" x2="600" y2="160" stroke="#34495e" stroke-width="1.5"/>
  <line x1="740" y1="150" x2="740" y2="160" stroke="#34495e" stroke-width="1.5"/>

  <!-- High intensity blocks (rally) -->
  <rect x="40" y="115" width="140" height="40" fill="#e74c3c" rx="3"/>
  <text x="110" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ラリー（10秒）</text>

  <rect x="320" y="115" width="140" height="40" fill="#e74c3c" rx="3"/>
  <text x="390" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ラリー（10秒）</text>

  <rect x="600" y="115" width="140" height="40" fill="#e74c3c" rx="3"/>
  <text x="670" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ラリー（10秒）</text>

  <!-- Rest blocks (between points) -->
  <rect x="180" y="125" width="140" height="20" fill="#5dade2" rx="3"/>
  <text x="250" y="139" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">休憩 20秒</text>

  <rect x="460" y="125" width="140" height="20" fill="#5dade2" rx="3"/>
  <text x="530" y="139" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">休憩 20秒</text>

  <!-- Heart rate annotations -->
  <text x="110" y="108" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">心拍 180</text>
  <text x="250" y="118" text-anchor="middle" font-size="9" fill="#2874a6" font-weight="bold">心拍 130</text>
  <text x="390" y="108" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">心拍 180</text>
  <text x="530" y="118" text-anchor="middle" font-size="9" fill="#2874a6" font-weight="bold">心拍 130</text>
  <text x="670" y="108" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">心拍 180</text>

  <!-- ============ Middle: comparison ============ -->
  <text x="20" y="240" font-size="14" fill="#222" font-weight="bold">▶ インターバルトレーニングとの一致</text>

  <!-- Left: tennis pattern -->
  <rect x="20" y="255" width="380" height="105" fill="#fdf6ec" stroke="#d68910" stroke-width="1.5" rx="4"/>
  <text x="210" y="278" text-anchor="middle" font-size="12" fill="#d68910" font-weight="bold">テニスの試合</text>

  <text x="40" y="302" font-size="10" fill="#9c640c">• 全力のラリー</text>
  <text x="200" y="302" font-size="10" fill="#9c640c" font-weight="bold">5〜10秒</text>

  <text x="40" y="320" font-size="10" fill="#9c640c">• ポイント間の休憩</text>
  <text x="200" y="320" font-size="10" fill="#9c640c" font-weight="bold">20〜25秒</text>

  <text x="40" y="338" font-size="10" fill="#9c640c">• 1試合の長さ</text>
  <text x="200" y="338" font-size="10" fill="#9c640c" font-weight="bold">1〜3時間</text>

  <text x="40" y="356" font-size="10" fill="#9c640c">• これを何百回も繰り返す</text>

  <!-- Equals sign -->
  <text x="410" y="315" text-anchor="middle" font-size="32" fill="#444" font-weight="bold">≒</text>

  <!-- Right: HIIT pattern -->
  <rect x="420" y="255" width="380" height="105" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
  <text x="610" y="278" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">インターバル（HIIT）</text>

  <text x="440" y="302" font-size="10" fill="#0e6251">• 高強度</text>
  <text x="600" y="302" font-size="10" fill="#0e6251" font-weight="bold">10〜30秒</text>

  <text x="440" y="320" font-size="10" fill="#0e6251">• 休憩・低強度</text>
  <text x="600" y="320" font-size="10" fill="#0e6251" font-weight="bold">10〜30秒</text>

  <text x="440" y="338" font-size="10" fill="#0e6251">• 1セッション</text>
  <text x="600" y="338" font-size="10" fill="#0e6251" font-weight="bold">15〜30分</text>

  <text x="440" y="356" font-size="10" fill="#0e6251">• 全力 ↔ 休憩を繰り返す</text>

  <!-- ============ Bottom: 3 benefits ============ -->
  <text x="20" y="385" font-size="14" fill="#222" font-weight="bold">▶ テニスに効く3つの理由</text>

  <rect x="20" y="395" width="252" height="90" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="146" y="416" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">①無酸素＋有酸素</text>
  <text x="146" y="436" text-anchor="middle" font-size="9" fill="#922b21">短時間の全力＝無酸素</text>
  <text x="146" y="450" text-anchor="middle" font-size="9" fill="#922b21">回復しながら続く＝有酸素</text>
  <text x="146" y="470" text-anchor="middle" font-size="9" fill="#922b21" font-weight="bold">両方を同時に鍛える</text>

  <rect x="284" y="395" width="252" height="90" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" rx="4"/>
  <text x="410" y="416" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">②ポイント間の回復</text>
  <text x="410" y="436" text-anchor="middle" font-size="9" fill="#2874a6">心拍を素早く下げる能力</text>
  <text x="410" y="450" text-anchor="middle" font-size="9" fill="#2874a6">＝20秒で次の準備ができる</text>
  <text x="410" y="470" text-anchor="middle" font-size="9" fill="#2874a6" font-weight="bold">3セット目で動き続けられる</text>

  <rect x="548" y="395" width="252" height="90" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
  <text x="674" y="416" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">③時短で効果大</text>
  <text x="674" y="436" text-anchor="middle" font-size="9" fill="#0e6251">15〜30分で完結</text>
  <text x="674" y="450" text-anchor="middle" font-size="9" fill="#0e6251">ジョギング1時間より効く</text>
  <text x="674" y="470" text-anchor="middle" font-size="9" fill="#0e6251" font-weight="bold">忙しい人ほど合う</text>
</svg>
