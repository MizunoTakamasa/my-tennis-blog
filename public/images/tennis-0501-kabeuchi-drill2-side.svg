<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100" height="600" font-family="'Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
  <rect width="1100" height="600" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="44" fill="#0f172a" font-size="22" font-weight="800">ドリル②  クロス打ちで左右に動かされる（反射角を利用）</text>
  <text x="40" y="70" fill="#64748b" font-size="14">壁は「入射角＝反射角」で返してくる。クロスに打つほど、自分が逆側に動かされる（上から見た図）</text>

  <!-- wall -->
  <rect x="80" y="120" width="940" height="30" fill="#94a3b8"/>
  <text x="550" y="110" text-anchor="middle" fill="#475569" font-size="14" font-weight="700">壁</text>

  <!-- wall hit points : 番号を円の中に入れて、テキストの重なりをなくす -->
  <circle cx="780" cy="135" r="13" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
  <text x="780" y="140" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800">①</text>

  <circle cx="320" cy="135" r="13" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
  <text x="320" y="140" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800">②</text>

  <!-- ball trajectories -->
  <!-- A's hit (yellow): A(280,370) → wall① -->
  <line x1="280" y1="370" x2="780" y2="148" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- A's reflection (blue): wall① → B(820,370) -->
  <line x1="780" y1="148" x2="820" y2="370" stroke="#0ea5e9" stroke-width="3"/>
  <polygon points="820,370 815,355 825,355" fill="#0ea5e9"/>
  <!-- B's hit (yellow): B(820,370) → wall② -->
  <line x1="820" y1="370" x2="320" y2="148" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- B's reflection (blue): wall② → A(280,370) -->
  <line x1="320" y1="148" x2="280" y2="370" stroke="#0ea5e9" stroke-width="3"/>
  <polygon points="280,370 275,355 285,355" fill="#0ea5e9"/>

  <!-- ground / home line -->
  <line x1="80" y1="430" x2="1020" y2="430" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- player A : 左側 -->
  <g transform="translate(280,400)">
    <circle cx="0" cy="-30" r="12" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-18" x2="0" y2="20" stroke="#0f172a" stroke-width="4"/>
    <line x1="-12" y1="20" x2="12" y2="20" stroke="#0f172a" stroke-width="3"/>
    <line x1="-12" y1="20" x2="-25" y2="50" stroke="#0f172a" stroke-width="4"/>
    <line x1="12" y1="20" x2="25" y2="50" stroke="#0f172a" stroke-width="4"/>
    <text x="0" y="78" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="800">A. 左から</text>
    <text x="0" y="96" text-anchor="middle" fill="#0f172a" font-size="12">壁の右(①)へクロスに打つ</text>
  </g>

  <!-- player B : 右側 -->
  <g transform="translate(820,400)">
    <circle cx="0" cy="-30" r="12" fill="#fde68a" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="-18" x2="0" y2="20" stroke="#0f172a" stroke-width="4"/>
    <line x1="-12" y1="20" x2="12" y2="20" stroke="#0f172a" stroke-width="3"/>
    <line x1="-12" y1="20" x2="-25" y2="50" stroke="#0f172a" stroke-width="4"/>
    <line x1="12" y1="20" x2="25" y2="50" stroke="#0f172a" stroke-width="4"/>
    <text x="0" y="78" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="800">B. 右から</text>
    <text x="0" y="96" text-anchor="middle" fill="#0f172a" font-size="12">壁の左(②)へクロスに打つ</text>
  </g>

  <!-- side step movement arrows : プレイヤーキャプション(y=496まで)の下、間隔を空けて配置 -->
  <path d="M310,525 L790,525" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowG2)"/>
  <text x="550" y="518" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">クロスに打った瞬間に、逆サイドへサイドステップ</text>

  <path d="M790,555 L310,555" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowG2)"/>
  <text x="550" y="548" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">次の球も同じ要領で逆サイドへ</text>

  <!-- legend : 軌道とぶつからない最下部に配置 -->
  <g transform="translate(160,585)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4"/>
    <text x="44" y="5" fill="#92400e" font-size="13" font-weight="700">点線(黄)：自分が打ったボール</text>
  </g>
  <g transform="translate(580,585)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#0ea5e9" stroke-width="3"/>
    <text x="44" y="5" fill="#0369a1" font-size="13" font-weight="700">実線(青)：壁から返ってくるボール</text>
  </g>

  <defs>
    <marker id="arrowG2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
