<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="雨の日の壁打ちのメリットを示した図解｜独占・反復・集中の3要素">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 17px; font-weight: 700; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
  </defs>
  <rect width="800" height="460" fill="#f6f9fc"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">雨の日の壁打ちのメリット｜3つの要素が揃う</text>
  <text x="400" y="62" class="cap" text-anchor="middle">＊上達フェーズの人にとってはむしろチャンス</text>

  <!-- 3 raindrops with merits -->
  <!-- 1: 独占 -->
  <path d="M 200 120 Q 160 175 165 215 A 40 40 0 0 0 235 215 Q 240 175 200 120 Z" fill="#3498db"/>
  <text x="200" y="180" class="stl" text-anchor="middle">独占</text>
  <text x="200" y="200" class="note" text-anchor="middle" fill="#fff">壁を独り占め</text>
  <rect x="100" y="250" width="200" height="120" rx="8" fill="#fff" stroke="#3498db" stroke-width="2"/>
  <text x="200" y="278" class="lbl" text-anchor="middle" font-weight="700">人がいない</text>
  <text x="115" y="305" class="note">・順番待ちなし</text>
  <text x="115" y="325" class="note">・場所取り不要</text>
  <text x="115" y="345" class="note">・好きな高さに打てる</text>
  <text x="115" y="365" class="note">・気兼ねなく失敗できる</text>

  <!-- 2: 反復 -->
  <path d="M 400 120 Q 360 175 365 215 A 40 40 0 0 0 435 215 Q 440 175 400 120 Z" fill="#27ae60"/>
  <text x="400" y="180" class="stl" text-anchor="middle">反復</text>
  <text x="400" y="200" class="note" text-anchor="middle" fill="#fff">数を打てる</text>
  <rect x="300" y="250" width="200" height="120" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="278" class="lbl" text-anchor="middle" font-weight="700">200球以上の集中反復</text>
  <text x="315" y="305" class="note">・同じ動作を続けられる</text>
  <text x="315" y="325" class="note">・体に染み込ませる時間</text>
  <text x="315" y="345" class="note">・フォーム作りに最適</text>
  <text x="315" y="365" class="note">・1球の重みが軽くなる</text>

  <!-- 3: 集中 -->
  <path d="M 600 120 Q 560 175 565 215 A 40 40 0 0 0 635 215 Q 640 175 600 120 Z" fill="#9b59b6"/>
  <text x="600" y="180" class="stl" text-anchor="middle">集中</text>
  <text x="600" y="200" class="note" text-anchor="middle" fill="#fff">邪魔されない</text>
  <rect x="500" y="250" width="200" height="120" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
  <text x="600" y="278" class="lbl" text-anchor="middle" font-weight="700">音と感覚に集中</text>
  <text x="515" y="305" class="note">・打球音が頼り</text>
  <text x="515" y="325" class="note">・自分のリズムだけ</text>
  <text x="515" y="345" class="note">・テーマを貫ける</text>
  <text x="515" y="365" class="note">・上達を体感しやすい</text>

  <!-- bottom takeaway -->
  <rect x="80" y="395" width="640" height="40" rx="6" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1.5"/>
  <text x="400" y="420" class="lbl" text-anchor="middle" fill="#2980b9" font-weight="700">★ 雨で人がいない日＝集中して動作を作り込むベストな環境</text>
</svg>
